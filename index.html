<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yazan Chess</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300..700&family=Fredoka:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1c2e 0%, #0f1016 100%); 
            margin: 0;
            font-family: 'Fredoka', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            position: relative;
        }

        body[dir="rtl"] {
            font-family: 'Cairo', sans-serif;
        }

        body[dir="rtl"] input, 
        body[dir="rtl"] select, 
        body[dir="rtl"] button {
            font-family: 'Cairo', sans-serif;
        }

        /* --- GLOBAL TOP ACTIONS OVERLAY PANEL --- */
        .global-top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            pointer-events: none;
        }

        .global-top-bar > * {
            pointer-events: auto;
        }

        .global-music-btn {
            font-family: 'Fredoka', sans-serif;
            background: rgba(27, 31, 50, 0.85);
            color: #94a3b8;
            border: 1px solid #2e3552;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        body[dir="rtl"] .global-music-btn {
            font-family: 'Cairo', sans-serif;
        }

        .global-music-btn:hover {
            color: #ffffff;
            border-color: #00d9f5;
            background: rgba(0, 217, 245, 0.08);
            transform: translateY(-1px);
        }

        .global-music-btn.active-music {
            border-color: #00d9f5;
            color: #00d9f5;
            background-color: rgba(0, 217, 245, 0.12);
            box-shadow: 0 0 15px rgba(0, 217, 245, 0.2);
        }

        .language-container {
            margin-top: 0;
            width: auto;
            max-width: none;
            z-index: auto;
        }

        .lang-select {
            font-family: 'Fredoka', sans-serif;
            background-color: rgba(27, 31, 50, 0.85);
            color: #94a3b8;
            border: 1px solid #2e3552;
            padding: 7px 12px;
            font-size: 13px;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(8px);
        }

        /* --- PRE-GAME SCREENS CONTAINER & CARDS --- */
        .setup-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1b1f32 0%, #121424 100%);
            padding: 55px 30px 30px 30px; 
            border-radius: 24px;
            border: 1px solid rgba(0, 245, 160, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 245, 160, 0.03);
            width: 90vw;
            max-width: 440px;
            box-sizing: border-box;
            z-index: 100;
            position: relative;
        }

        .hidden-panel {
            display: none !important;
        }

        .setup-card h2 {
            color: #ffffff;
            margin-top: 5px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 19px;
            font-weight: 600;
            text-align: center;
            border-bottom: 2px solid #00f5a0;
            padding-bottom: 12px;
            width: 100%;
            text-shadow: 0 0 10px rgba(0, 245, 160, 0.2);
        }
        
        body[dir="rtl"] .setup-card h2 {
            letter-spacing: 0;
        }

        .back-nav-btn {
            position: absolute;
            top: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            padding: 6px 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            z-index: 110;
        }
        
        body:not([dir="rtl"]) .back-nav-btn { left: 15px; }
        body[dir="rtl"] .back-nav-btn { right: 15px; }

        .back-nav-btn:hover {
            color: #00f5a0;
            border-color: #00f5a0;
            background: rgba(0, 245, 160, 0.08);
            transform: translateY(-1px);
        }

        body[dir="rtl"] .back-nav-btn span {
            transform: scaleX(-1);
            display: inline-block;
        }

        .setup-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 20px;
            gap: 8px;
        }

        .setup-group label {
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .username-input {
            font-family: 'Fredoka', sans-serif;
            background-color: #0b0c16;
            color: #ffffff;
            border: 2px solid #2e3552;
            padding: 14px;
            font-size: 16px;
            border-radius: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .username-input:focus {
            border-color: #00f5a0;
            box-shadow: 0 0 12px rgba(0, 245, 160, 0.15);
        }

        .greeting-text {
            color: #ffffff;
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
            font-weight: 400;
        }

        .greeting-name {
            color: #00f5a0;
            font-weight: 700;
            display: block;
            margin-top: 5px;
            font-size: 32px;
            text-shadow: 0 0 15px rgba(0, 245, 160, 0.3);
        }

        .animate-pop {
            animation: popInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .mode-btn {
            font-family: 'Fredoka', sans-serif;
            background: #0b0c16;
            color: white;
            border: 2px solid #2e3552;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 12px;
            width: 100%;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body:not([dir="rtl"]) .mode-btn { text-align: left; }
        body[dir="rtl"] .mode-btn { text-align: right; }

        .mode-btn:hover {
            border-color: #00f5a0;
            background: rgba(0, 245, 160, 0.04);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .mode-title {
            font-size: 17px;
            font-weight: 600;
            color: #00f5a0;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-desc {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.4;
            font-weight: 300;
        }

        .link-box {
            background-color: #0b0c16;
            color: #00d9f5;
            border: 1px dashed #00d9f5;
            padding: 12px;
            font-size: 13px;
            border-radius: 10px;
            word-break: break-all;
            user-select: all;
            margin-bottom: 15px;
            text-align: center;
            direction: ltr !important; 
            font-family: 'Fredoka', sans-serif !important;
        }

        .side-container {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .side-btn {
            font-family: 'Fredoka', sans-serif;
            flex: 1;
            background-color: #0b0c16;
            color: #ffffff;
            border: 2px solid #2e3552;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .side-btn:hover {
            border-color: #414b75;
        }

        .side-btn.selected {
            border-color: #00f5a0;
            background-color: rgba(0, 245, 160, 0.12);
            box-shadow: 0 0 12px rgba(0, 245, 160, 0.15);
            color: #00f5a0;
        }

        .setup-select {
            font-family: 'Fredoka', sans-serif;
            background-color: #0b0c16;
            color: #ffffff;
            border: 2px solid #2e3552;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .setup-select:focus {
            border-color: #00f5a0;
        }

        .action-submit-btn {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
            color: #090d16;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(0, 245, 160, 0.3);
            transition: all 0.2s ease;
        }

        .action-submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(0, 245, 160, 0.45);
        }

        .action-submit-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            box-shadow: none;
            color: #ffffff;
        }

        /* --- GAMEPLAY MAIN VIEWPORT LAYOUT --- */
        .game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 95vw;
            max-width: 1100px;
        }

        .arena-workspace {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 24px;
            width: 100%;
        }

        @media (max-width: 850px) {
            .arena-workspace {
                flex-direction: column;
                align-items: center;
            }
            .coach-panel {
                width: 90vw !important;
                max-width: 550px !important;
                height: 240px !important;
            }
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #1b1f32 0%, #121424 100%);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0, 245, 160, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            width: 90vw;
            max-width: 550px;
            box-sizing: border-box;
        }

        .panel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 15px;
        }

        .selector-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-panel label {
            color: #94a3b8;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }

        .bot-selector {
            font-family: 'Fredoka', sans-serif;
            background-color: #0b0c16;
            color: #ffffff;
            border: 2px solid #00f5a0;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            font-family: 'Fredoka', sans-serif;
            background-color: #242942;
            color: #e2e8f0;
            border: 1px solid #3b446e;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background-color: #2e3554;
            color: #ffffff;
            border-color: #4e598c;
        }

        .action-btn.danger {
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .action-btn.danger:hover {
            background-color: #991b1b;
            border-color: #ef4444;
            color: #ffffff;
        }

        #myBoard {
            width: 90vw;
            max-width: 550px;  
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(0, 245, 160, 0.2);
        }

        /* --- COACH REAL-TIME CHAT PANEL --- */
        .coach-panel {
            display: none;
            flex-direction: column;
            width: 380px;
            height: 608px;
            background: linear-gradient(135deg, #1b1f32 0%, #121424 100%);
            border-radius: 20px;
            border: 1px solid rgba(0, 217, 245, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            box-sizing: border-box;
        }

        .coach-header {
            background: rgba(11, 12, 22, 0.4);
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coach-avatar {
            font-size: 26px;
            background: rgba(0, 217, 245, 0.1);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid #00d9f5;
        }

        .coach-meta h4 {
            margin: 0;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
        }

        .coach-meta span {
            color: #00d9f5;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .coach-chat-history {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.4;
        }

        .chat-bubble.coach {
            background: #252a45;
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .chat-bubble.user {
            background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
            color: #090d16;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .coach-input-area {
            padding: 12px;
            background: rgba(11, 12, 22, 0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 8px;
        }

        .coach-text-field {
            font-family: 'Fredoka', sans-serif;
            flex: 1;
            background: #0b0c16;
            border: 1px solid #2e3552;
            border-radius: 10px;
            padding: 10px 14px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
        }
        .coach-text-field:focus {
            border-color: #00d9f5;
        }

        .coach-send-btn {
            background: #00d9f5;
            color: #090d16;
            border: none;
            border-radius: 10px;
            padding: 0 16px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        /* --- CHECKMATE OVERLAY --- */
        .checkmate-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 12, 22, 0.9); 
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .checkmate-box {
            background: #1b1f32;
            padding: 35px 45px;
            border-radius: 24px;
            border: 3px solid #00f5a0; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(0, 245, 160, 0.2);
            width: 80%;
            max-width: 340px;
            transform: scale(0);
            animation: popInScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .checkmate-box h1 {
            color: #ffffff;
            margin: 0 0 12px 0;
            font-size: 36px;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 245, 160, 0.3);
        }

        .checkmate-box p {
            color: #94a3b8;
            font-size: 16px;
            margin: 0 0 25px 0;
            line-height: 1.4;
            font-weight: 400;
        }

        .restart-btn {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #00f5a0 0%, #00d9f5 100%);
            color: #090d16;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%; 
            box-shadow: 0 4px 15px rgba(0, 245, 160, 0.3);
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            box-shadow: 0 6px 20px rgba(0, 245, 160, 0.45);
            transform: translateY(-1px);
        }

        @keyframes popInScale {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="global-top-bar">
        <div id="globalLanguagePicker" class="language-container">
            <select class="lang-select" onchange="changeLanguage(this.value)">
                <option value="en" selected>🇺🇸 English (EN)</option>
                <option value="es">🇪🇸 Español (ES)</option>
                <option value="fr">🇫🇷 Français (FR)</option>
                <option value="ar">🇸🇦 العربية (AR)</option>
            </select>
        </div>
        <button class="global-music-btn" id="musicToggleBtn" onclick="toggleBackgroundMusic()">🎵 <span data-i18n="btn_music">Music Off</span></button>
    </div>

    <div id="usernameScreen" class="setup-card">
        <h2 data-i18n="profile_title">Player Profile</h2>
        <div class="setup-group">
            <label for="usernameInput" data-i18n="enter_username">Enter Your Username</label>
            <input type="text" id="usernameInput" class="username-input" placeholder="Grandmaster..." maxlength="15" oninput="validateUsernameForm()">
        </div>
        <button id="usernameNextBtn" class="action-submit-btn" disabled onclick="submitUsername()" data-i18n="btn_next">Next</button>
    </div>

    <div id="greetingScreen" class="setup-card hidden-panel">
        <div class="greeting-text animate-pop">
            <span data-i18n="welcome_arena">Welcome to the Arena,</span>
            <span id="displayUsername" class="greeting-name">Player</span>
        </div>
    </div>

    <div id="modeScreen" class="setup-card hidden-panel">
        <button class="back-nav-btn" onclick="navigateToStep('username')"><span>←</span> <b data-i18n="btn_back">Back</b></button>
        <h2 data-i18n="select_mode_title">Select Match Architecture</h2>
        
        <button class="mode-btn" onclick="selectMode('bot')">
            <div class="mode-title" data-i18n="mode_bot_title">🤖 Combat Engine</div>
            <div class="mode-desc" data-i18n="mode_bot_desc">Play locally against our variable-depth neural approximation engines. Perfect for training.</div>
        </button>

        <button class="mode-btn" onclick="selectMode('coach')">
            <div class="mode-title" data-i18n="mode_coach_title">👨‍🏫 Train with a Coach</div>
            <div class="mode-desc" data-i18n="mode_coach_desc">Play matching dynamic levels while an AI Grandmaster analyzes your position and chats with you.</div>
        </button>

        <button class="mode-btn" onclick="selectMode('multiplayer')">
            <div class="mode-title" data-i18n="mode_multi_title">⚔️ Live Multiplayer</div>
            <div class="mode-desc" data-i18n="mode_multi_desc">Generate an instant, secure pairing room link to challenge a friend anywhere in the world.</div>
        </button>
    </div>

    <div id="setupScreen" class="setup-card hidden-panel">
        <button class="back-nav-btn" onclick="navigateToStep('mode')"><span>←</span> <b data-i18n="btn_back">Back</b></button>
        <h2 id="setupScreenTitle" data-i18n="match_init_title">Match Initialization</h2>
        
        <div class="setup-group">
            <label data-i18n="choose_alignment">Choose Alignment</label>
            <div class="side-container">
                <button id="sideWhite" class="side-btn selected" onclick="selectSide('w')" data-i18n="side_white">White</button>
                <button id="sideBlack" class="side-btn" onclick="selectSide('b')" data-i18n="side_black">Black</button>
                <button id="sideRandom" class="side-btn" onclick="selectSide('r')" data-i18n="side_random">Random</button>
            </div>
        </div>

        <div class="setup-group">
            <label for="setupLevel" data-i18n="engine_level_label">Opponent Engine Level</label>
            <select id="setupLevel" class="setup-select">
                <option value="1" selected data-i18n="lvl_1">Level 1 (Casual Beginner)</option>
                <option value="2" data-i18n="lvl_2">Level 2 (Tactical Normal)</option>
                <option value="3" data-i18n="lvl_3">Level 3 (Grandmaster Mode)</option>
            </select>
        </div>

        <button class="action-submit-btn" onclick="startGame(currentGameMode)" data-i18n="btn_start">Start Match</button>
    </div>

    <div id="multiplayerSetupScreen" class="setup-card hidden-panel">
        <button class="back-nav-btn" onclick="navigateToStep('mode')"><span>←</span> <b data-i18n="btn_back">Back</b></button>
        <h2 data-i18n="room_reg_title">Room Registration</h2>
        <div class="setup-group">

        // --- DYNAMIC DISPATCH LIFECYCLE HANDLERS ---
        document.addEventListener("DOMContentLoaded", function() {
            parseURLParameters();
            updateUILocalization();
            
            // AUTOMATIC STORAGE SYSTEM TRIGGER
            var savedUsername = localStorage.getItem("yazan_chess_username");
            if (savedUsername && !isGuestJoining) {
                username = savedUsername;
                document.getElementById('displayUsername').innerText = username;
                document.getElementById('usernameInput').value = username;
                validateUsernameForm();

                // Skip profile card completely, route right into choice panel
                document.getElementById('usernameScreen').classList.add('hidden-panel');
                document.getElementById('modeScreen').classList.remove('hidden-panel');
            }
        });

        function parseURLParameters() {
            var params = new URLSearchParams(window.location.search);
            var room = params.get('room');
            if (room) {
                isGuestJoining = true;
                currentGameMode = 'multiplayer';
                playerColor = 'b'; // Assigned black as secondary guest connector
            }
        }

        function changeLanguage(lang) {
            currentLang = lang;
            var isRTL = (lang === 'ar');
            document.body.setAttribute('dir', isRTL ? 'rtl' : 'ltr');
            updateUILocalization();
        }

        function updateUILocalization() {
            document.querySelectorAll('[data-i18n]').forEach(function(element) {
                var key = element.getAttribute('data-i18n');
                if (i18n[currentLang] && i18n[currentLang][key]) {
                    if (key === 'btn_music') {
                        element.innerText = isMusicPlaying ? i18n[currentLang].btn_music_on : i18n[currentLang].btn_music;
                    } else {
                        element.innerText = i18n[currentLang][key];
                    }
                }
            });

            var tx = document.getElementById('coachTextField');
            if(tx && i18n[currentLang].coach_placeholder) {
                tx.placeholder = i18n[currentLang].coach_placeholder;
            }
        }

        function validateUsernameForm() {
            var val = document.getElementById('usernameInput').value.trim();
            document.getElementById('usernameNextBtn').disabled = (val.length === 0);
        }

        function submitUsername() {
            var inputVal = document.getElementById('usernameInput').value.trim();
            if (inputVal.length > 0) {
                username = inputVal;
                
                // Write directly to local storage cache file context
                localStorage.setItem("yazan_chess_username", username);
                
                document.getElementById('displayUsername').innerText = username;
                
                document.getElementById('usernameScreen').classList.add('hidden-panel');
                document.getElementById('greetingScreen').classList.remove('hidden-panel');
                
                setTimeout(function() {
                    document.getElementById('greetingScreen').classList.add('hidden-panel');
                    if (isGuestJoining) {
                        startGame('multiplayer');
                    } else {
                        document.getElementById('modeScreen').classList.remove('hidden-panel');
                    }
                }, 1800);
            }
        }

        function navigateToStep(step) {
            document.getElementById('usernameScreen').classList.add('hidden-panel');
            document.getElementById('modeScreen').classList.add('hidden-panel');
            document.getElementById('setupScreen').classList.add('hidden-panel');
            document.getElementById('multiplayerSetupScreen').classList.add('hidden-panel');
            
            if (step === 'username') {
                document.getElementById('usernameScreen').classList.remove('hidden-panel');
                if(username !== "Player") {
                    document.getElementById('usernameInput').value = username;
                    validateUsernameForm();
                }
            } else if (step === 'mode') {
                document.getElementById('modeScreen').classList.remove('hidden-panel');
            }
        }

        function selectMode(mode) {
            currentGameMode = mode;
            document.getElementById('modeScreen').classList.add('hidden-panel');
            
            if (mode === 'multiplayer') {
                document.getElementById('multiplayerSetupScreen').classList.remove('hidden-panel');
                var dummyRoomId = "room_" + Math.random().toString(36).substring(2, 10);
                var inviteUrl = window.location.origin + window.location.pathname + "?room=" + dummyRoomId;
                document.getElementById('inviteLinkBox').innerText = inviteUrl;
            } else {
                var titleKey = (mode === 'coach') ? 'coach_init_title' : 'match_init_title';
                document.getElementById('setupScreenTitle').setAttribute('data-i18n', titleKey);
                document.getElementById('setupScreenTitle').innerText = i18n[currentLang][titleKey];
                document.getElementById('setupScreen').classList.remove('hidden-panel');
            }
        }

        function selectSide(color) {
            playerColor = color;
            document.getElementById('sideWhite').classList.remove('selected');
            document.getElementById('sideBlack').classList.remove('selected');
            document.getElementById('sideRandom').classList.remove('selected');
            
            if (color === 'w') document.getElementById('sideWhite').classList.add('selected');
            if (color === 'b') document.getElementById('sideBlack').classList.add('selected');
            if (color === 'r') document.getElementById('sideRandom').classList.add('selected');
        }

        function copyInviteLink() {
            var linkText = document.getElementById('inviteLinkBox').innerText;
            navigator.clipboard.writeText(linkText).then(function() {
                alert(i18n[currentLang].alert_copy);
            });
        }

        function syncEngineLevelSelector(val) {
            document.getElementById('setupLevel').value = val;
            document.getElementById('botLevel').value = val;
        }

        // --- SUBMIT GAME BOOTLOADER WORKSPACE ---
        function startGame(mode) {
            // Setup alignment randomization mechanics
            if (playerColor === 'r') {
                playerColor = Math.random() < 0.5 ? 'w' : 'b';
            }

            // Interface switches
            document.getElementById('setupScreen').classList.add('hidden-panel');
            document.getElementById('multiplayerSetupScreen').classList.add('hidden-panel');
            document.getElementById('gameContainer').style.display = 'flex';

            if (mode === 'coach') {
                document.getElementById('coachPanel').style.display = 'flex';
                document.getElementById('engineSelectorWrapper').classList.remove('hidden-panel');
                document.getElementById('multiplayerStatusWrapper').classList.add('hidden-panel');
                initializeCoachWelcomeMessage();
            } else if (mode === 'multiplayer') {
                document.getElementById('coachPanel').style.display = 'none';
                document.getElementById('engineSelectorWrapper').classList.add('hidden-panel');
                document.getElementById('multiplayerStatusWrapper').classList.remove('hidden-panel');
            } else {
                document.getElementById('coachPanel').style.display = 'none';
                document.getElementById('engineSelectorWrapper').classList.remove('hidden-panel');
                document.getElementById('multiplayerStatusWrapper').classList.add('hidden-panel');
            }

            var selectedLevel = document.getElementById('setupLevel').value;
            document.getElementById('botLevel').value = selectedLevel;

            // Generate Board instance viewport configuration bounds
            var boardConfig = {
                draggable: true,
                position: 'start',
                orientation: (playerColor === 'b') ? 'black' : 'white',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                pieceTheme: getPiecePath
            };
            
            game.reset();
            board = Chessboard('myBoard', boardConfig);
            $(window).resize(board.resize);

            // Audio API boot configuration hook
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {}
            }

            // Engine moves first if player chose Black side alignment
            if (playerColor === 'b' && (currentGameMode === 'bot' || currentGameMode === 'coach')) {
                setTimeout(triggerEngineMoveCalculation, 600);
            }
        }

        function returnToMenu() {
            document.getElementById('checkmateOverlay').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'none';
            
            // Re-route clean entry layout choice screens based on cache states
            document.getElementById('usernameScreen').classList.add('hidden-panel');
            document.getElementById('greetingScreen').classList.add('hidden-panel');
            document.getElementById('setupScreen').classList.add('hidden-panel');
            document.getElementById('multiplayerSetupScreen').classList.add('hidden-panel');
            
            document.getElementById('modeScreen').classList.remove('hidden-panel');
        }

        // --- WEB AUDIO GENERATIVE CHORD SOUND DESIGN ---
        function playSynthesizerTone(frequency, type, duration, volume) {
            if (!audioCtx) return;
            try {
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.value = frequency;
                
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function executeMovementAudioChime(isCapture, isCheck) {
            if (isCheck) {
                playSynthesizerTone(523.25, 'triangle', 0.15, 0.25); // C5 check chime
                setTimeout(function(){ playSynthesizerTone(659.25, 'triangle', 0.3, 0.25); }, 80); // E5
            } else if (isCapture) {
                playSynthesizerTone(293.66, 'sawtooth', 0.2, 0.12); // D4 scratch component
                playSynthesizerTone(196.00, 'sine', 0.25, 0.3); // G3 bottom resonance weight
            } else {
                playSynthesizerTone(329.63, 'sine', 0.12, 0.35); // E4 casual clear tone node
            }
        }

        function triggerBackgroundMusic() {
            if (!audioCtx) return;
            
            var chords = [
                [130.81, 164.81, 196.00, 261.63], // C Major foundational sweep bounds
                [146.83, 174.61, 220.00, 293.66], // D minor modal pivot element
                [130.81, 174.61, 220.00, 349.23], // F Major structural expansion array
                [116.54, 146.83, 174.61, 233.08]  // Bb Major mixolydian cadential shift
            ];

            var chord = chords[currentChordIndex];
            chord.forEach(function(freq, i) {
                try {
                    var osc = audioCtx.createOscillator();
                    var gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.015, audioCtx.currentTime + 1.5);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4.8);
                    
                    osc.connect(gain);
                    gain.connect(musicGainNode);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 5.0);
                } catch(e) {}
            });

            currentChordIndex = (currentChordIndex + 1) % chords.length;
        }

        function toggleBackgroundMusic() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) { return; }
            }
            
            if (isMusicPlaying) {
                clearInterval(musicInterval);
                isMusicPlaying = false;
                if(musicGainNode) musicGainNode.gain.value = 0;
                document.getElementById('musicToggleBtn').classList.remove('active-music');
            } else {
                if (!musicGainNode) {
                    musicGainNode = audioCtx.createGain();
                    musicGainNode.connect(audioCtx.destination);
                }
                musicGainNode.gain.value = 1;
                isMusicPlaying = true;
                triggerBackgroundMusic();
                musicInterval = setInterval(triggerBackgroundMusic, 5000);
                document.getElementById('musicToggleBtn').classList.add('active-music');
            }
            updateUILocalization();
        }

        // --- GAME MECHANICS MOVEMENT MATRIX LOGIC ---
        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;

            // Block validation rules matching alignment orientations
            if ((currentGameMode === 'bot' || currentGameMode === 'coach') && 
                ((playerColor === 'w' && piece.search(/^b/) !== -1) || 
                 (playerColor === 'b' && piece.search(/^w/) !== -1))) {
                return false;
            }
        }

        function onDrop(source, target) {
            // Intercept legal move configurations
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Auto promote profile parameters to Queen structure
            });

            if (move === null) return 'snapback';

            var isCapture = move.flags.includes('c') || move.flags.includes('e');
            var isCheck = game.in_check();
            executeMovementAudioChime(isCapture, isCheck);

            // Coach evaluation hooks context
            if (currentGameMode === 'coach') {
                processCoachResponseMetrics(move, isCapture);
            }

            checkMatchTerminalConditions();

            // Fire response loop sequences inside match parameters
            if (!game.game_over() && (currentGameMode === 'bot' || currentGameMode === 'coach')) {
                setTimeout(triggerEngineMoveCalculation, 600);
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function takebackMove() {
            if (currentGameMode === 'multiplayer') return;
            
            // Undo twice to revert human player back one ply position state
            game.undo();
            game.undo();
            board.position(game.fen());
        }

        // --- ENEMY ENGINE ARTIFICIAL APPROXIMATION ---
        function triggerEngineMoveCalculation() {
            if (game.game_over()) return;

            var legalMoves = game.moves({ verbose: true });
            if (legalMoves.length === 0) return;

            var currentDepthLevel = parseInt(document.getElementById('botLevel').value) || 1;
            var targetMove = null;

            if (currentDepthLevel === 1) {
                // Random deployment matrix layout
                var index = Math.floor(Math.random() * legalMoves.length);
                targetMove = legalMoves[index];
            } else if (currentDepthLevel === 2) {
                // Tactical prioritization strategy filters
                var captureMoves = legalMoves.filter(function(m) { return m.flags.includes('c') || m.flags.includes('e'); });
                if (captureMoves.length > 0 && Math.random() < 0.70) {
                    targetMove = captureMoves[Math.floor(Math.random() * captureMoves.length)];
                } else {
                    targetMove = legalMoves[Math.floor(Math.random() * legalMoves.length)];
                }
            } else {
                // High heuristic deep sweep search parameters fallback
                var capturingOrCheckingMoves = legalMoves.filter(function(m) {
                    game.move({ from: m.from, to: m.to, promotion: 'q' });
                    var givesCheck = game.in_check();
                    game.undo();
                    return givesCheck || m.flags.includes('c') || m.flags.includes('e');
                });

                if (capturingOrCheckingMoves.length > 0 && Math.random() < 0.85) {
                    targetMove = capturingOrCheckingMoves[Math.floor(Math.random() * capturingOrCheckingMoves.length)];
                } else {
                    targetMove = legalMoves[Math.floor(Math.random() * legalMoves.length)];
                }
            }

            if (targetMove) {
                var executedMove = game.move({
                    from: targetMove.from,
                    to: targetMove.to,
                    promotion: 'q'
                });

                board.position(game.fen());
                
                var isCap = executedMove.flags.includes('c') || executedMove.flags.includes('e');
                var isChk = game.in_check();
                executeMovementAudioChime(isCap, isChk);
                
                checkMatchTerminalConditions();
            }
        }

        function checkMatchTerminalConditions() {
            if (game.in_checkmate()) {
                var winner = game.turn() === 'w' ? 'Black' : 'White';
                var labelWinner = winner === 'White' ? i18n[currentLang].side_white : i18n[currentLang].side_black;

                var announcement = "";
                if (currentGameMode === 'bot' || currentGameMode === 'coach') {
                    announcement = (winner === 'White' && playerColor === 'w') || (winner === 'Black' && playerColor === 'b') 
                        ? username + i18n[currentLang].win_msg
                        : i18n[currentLang].lose_msg + username + i18n[currentLang].by_checkmate;
                } else {
                    announcement = i18n[currentLang].multi_win + labelWinner + " .";
                }

                document.getElementById('winnerMessage').innerText = announcement;
                document.getElementById('checkmateOverlay').style.display = 'flex';
            }
        }

        function getPiecePath(piece) {
            var paths = {
                'wP': '4/45/Chess_plt45', 'wR': '7/72/Chess_rlt45', 'wN': '7/70/Chess_nlt45',
                'wB': 'b/b1/Chess_blt45', 'wQ': '1/15/Chess_qlt45', 'wK': '4/42/Chess_klt45',
                'bP': 'c/c7/Chess_pdt45', 'bR': 'f/ff/Chess_rdt45', 'bN': 'e/ef/Chess_ndt45',
                'bB': '9/98/Chess_bdt45', 'bQ': '4/47/Chess_qdt45', 'bK': 'f/f0/Chess_kdt45'
            };
            if (paths[piece]) {
                return 'https://upload.wikimedia.org/wikipedia/commons/' + paths[piece] + '.svg';
            }
            return 'img/chesspieces/wikipedia/' + piece + '.png';
        }

        // --- TRAIN GRANDMASTER COACH CHAT CORE MODULE ---
        function appendChatBubbleElement(message, sender) {
            var wrapper = document.getElementById('coachChatHistory');
            if (!wrapper) return;
            
            var bubble = document.createElement('div');
            bubble.classList.add('chat-bubble', sender);
            bubble.innerText = message;
            
            wrapper.appendChild(bubble);
            wrapper.scrollTop = wrapper.scrollHeight;
        }

        function initializeCoachWelcomeMessage() {
            var history = document.getElementById('coachChatHistory');
            if (history) history.innerHTML = "";
            appendChatBubbleElement(i18n[currentLang].coach_welcome, 'coach');
        }

        function processCoachResponseMetrics(move, isCapture) {
            setTimeout(function() {
                var text = i18n[currentLang].coach_reply_generic;
                if (isCapture) {
                    text = i18n[currentLang].coach_reply_capture;
                } else if (move.sanityPiece === 'p' || Math.random() < 0.5) {
                    text = i18n[currentLang].coach_reply_move;
                }
                appendChatBubbleElement(text, 'coach');
            }, 750);
        }

        function submitCoachMessage() {
            var input = document.getElementById('coachTextField');
            var msg = input.value.trim();
            if (msg.length === 0) return;

            appendChatBubbleElement(msg, 'user');
            input.value = "";

            // Generic automated reflection timeout loop parameters
            setTimeout(function() {
                appendChatBubbleElement(i18n[currentLang].coach_reply_generic, 'coach');
            }, 1000);
        }
    </script>
